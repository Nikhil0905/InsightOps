[InsightOps – Credential Dumping (Linux)]
action.logevent = 1
action.logevent.param.event = InsightOps alert fired: Credential Dumping (Linux)
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = * * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=main sourcetype=linux_secure\
("shadow" OR "gshadow")\
("cat" OR "less" OR "more" OR "vim" OR "nano" OR "awk" OR "sed")\
| rex "user (?<user>\S+)"\
| rex "by (?<by_user>\S+)"\
| eval actor=coalesce(user, by_user, "unknown")\
| where actor!="root"\
| stats\
    count AS access_count\
    values(actor) AS users\
    by host\
| where access_count >= 1\
| eval alert_name="InsightOps – Credential Dumping (Linux)"\
| eval severity="critical"\
| eval mitre_technique="T1003"\
| eval explanation="Access to Linux credential storage files (/etc/shadow or /etc/gshadow) detected, indicating possible credential dumping"\
| table host users access_count alert_name severity mitre_technique explanation

[InsightOps – Ransomware Pre-Impact (Linux)]
action.logevent = 1
action.logevent.param.event = InsightOps alert fired: Ransomware Pre-Impact (Linux)
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = * * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=main sourcetype=linux_secure\
(\
    "COMMAND=/usr/bin/systemctl stop" OR\
    "COMMAND=/bin/systemctl stop" OR\
    "COMMAND=/usr/bin/systemctl disable" OR\
    "COMMAND=/bin/systemctl disable" OR\
\
    "COMMAND=journalctl --vacuum" OR\
    "COMMAND=logrotate -f" OR\
    "COMMAND=> /var/log" OR\
    "COMMAND=truncate -s 0" OR\
\
    "COMMAND=chmod -R" OR\
    "COMMAND=chattr -i" OR\
    "COMMAND=mount -o remount,rw" OR\
\
    "COMMAND=rm -rf /var/log" OR\
    "COMMAND=rm -rf /home" OR\
    "COMMAND=rm -rf /root" OR\
    "COMMAND=rm -rf /etc" OR\
\
    "COMMAND=setenforce 0" OR\
    "COMMAND=ufw disable" OR\
    "COMMAND=aa-disable" OR\
\
    "COMMAND=pkill" OR\
    "COMMAND=killall" OR\
    "COMMAND=kill -9"\
)\
\
| rex "^sudo:\s+(?<actor>[^\s:]+)"\
| rex "COMMAND=(?<command>.+)"\
\
| stats\
    count AS suspicious_actions\
    values(command) AS commands\
    values(actor) AS users\
    by host\
\
| where suspicious_actions >= 1\
\
| eval alert_name="InsightOps – Ransomware Pre-Impact (Linux)"\
| eval severity="critical"\
| eval mitre_technique="T1490, T1562"\
| eval explanation="Privileged commands detected that disable logging, defenses, recovery mechanisms, or prepare the filesystem for encryption, consistent with Linux ransomware pre-impact behavior"\
\
| table host users suspicious_actions commands alert_name severity mitre_technique explanation

[InsightOps – Password Spraying (Windows)]
action.logevent = 1
action.logevent.param.event = InsightOps alert fired: Password Spraying (Windows)
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = * * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=main EventCode=4625\
| stats count AS failures\
        dc(TargetUserName) AS unique_users\
        values(TargetUserName) AS users\
        values(IpAddress) AS src_ip\
        by Computer\
| where unique_users >= 1 AND failures >= 2\
| eval alert_name="Password Spraying Detected"\
| eval severity="high"\
| eval mitre_technique="T1110"\
| eval host=Computer\
| eval user=mvjoin(users,",")\
| eval source_ip=mvjoin(src_ip,",")\
| eval explanation="Multiple failed authentication attempts across multiple users, consistent with password spraying"
