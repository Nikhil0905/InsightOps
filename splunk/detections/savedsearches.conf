[InsightOps – Privilege Escalation (Windows)]
action.logevent = 1
action.logevent.param.event = InsightOps alert fired: Privilege Escalation (Windows)
action.logevent.param.source = alert:InsightOps – Privilege Escalation (Windows)
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = * * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=main EventCode=4672\
| search SubjectUserName!="SYSTEM"\
| stats\
    count AS priv_event_count\
    values(PrivilegeList) AS privileges\
    by SubjectUserName SubjectDomainName host\
| eval attack_type="Privilege Escalation",\
       detection="Special Privileges Assigned",\
       platform="Windows",\
       confidence="high"

