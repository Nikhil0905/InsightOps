[InsightOps – Password Spraying (Linux)]
action.logevent = 1
action.logevent.param.event = InsightOps alert fired: Password Spraying (Linux)
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=main sourcetype=linux_secure\
("Failed password" OR "authentication failure" OR "Invalid user")\
| rex "from (?<source_ip>\d{1,3}(?:\.\d{1,3}){3})"\
| rex "user (?<user>\S+)"\
| stats \
    count AS failures\
    dc(user) AS unique_users\
    values(user) AS users\
    by host source_ip\
| where failures >= 6 AND unique_users >= 2\
| eval alert_name="InsightOps – Password Spraying (Linux)"\
| eval severity="high"\
| eval mitre_technique="T1110.003"\
| eval explanation="Multiple failed SSH authentication attempts across multiple users, consistent with password spraying"\
| table host source_ip failures unique_users alert_name severity mitre_technique explanation

